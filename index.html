<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nikhil Gaddam — Resume</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #f4f4f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
    }

    header h1 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #111;
      letter-spacing: 0.01em;
    }

    header a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: #111;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      transition: background 0.15s;
    }
    header a:hover { background: #333; }

    .viewer {
      width: 100%;
      height: calc(100vh - 50px);
    }

    .viewer iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: #888;
      font-size: 0.95rem;
    }
    .fallback a { color: #111; font-weight: 600; text-decoration: none; }
    .fallback a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <h1>Nikhil Gaddam</h1>
    <a href="nikhil_gaddam.pdf" download>&#8659;&nbsp; Download Resume</a>
  </header>

  <div class="viewer" id="viewer">
    <iframe
      src="nikhil_gaddam.pdf#toolbar=1&navpanes=0"
      title="Nikhil Gaddam Resume"
      id="pdfFrame"
    ></iframe>
  </div>

  <!-- Default Statcounter code for Nikhil's Portfolio https://nikhilgaddam.com/ -->
  <script type="text/javascript">
    var sc_project=13209483;
    var sc_invisible=1;
    var sc_security="285db3ff";
  </script>
  <script type="text/javascript" src="https://www.statcounter.com/counter/counter.js" async></script>
  <noscript>
    <div class="statcounter">
      <a title="Web Analytics" href="https://statcounter.com/" target="_blank">
        <img class="statcounter" src="https://c.statcounter.com/13209483/0/285db3ff/1/"
             alt="Web Analytics" referrerPolicy="no-referrer-when-downgrade" />
      </a>
    </div>
  </noscript>
  <!-- End of Statcounter Code -->

  <script>
    // PDF fallback for browsers that block iframe embeds
    document.getElementById('pdfFrame').onerror = function () {
      const v = document.getElementById('viewer');
      v.innerHTML =
        '<div class="fallback" style="display:flex">' +
        '<p>Your browser couldn\'t display the PDF inline.</p>' +
        '<a href="nikhil_gaddam.pdf" download>Download Resume instead</a>' +
        '</div>';
    };
  </script>

</body>
</html>
